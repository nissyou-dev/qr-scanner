<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Phase 0 疎通テスト — camera-qr → GAS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8; padding: 16px; line-height: 1.5;
    }
    main { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.2rem; color: #2d6a4f; margin-bottom: 12px; }
    p { font-size: 0.9rem; color: #374151; margin-bottom: 8px; }

    label { display: block; font-size: 0.85rem; color: #374151; margin-top: 10px; }
    input[type="text"] {
      width: 100%; padding: 10px; border: 1px solid #cbd5e1;
      border-radius: 8px; font-size: 0.95rem; margin-top: 4px;
      font-family: ui-monospace, monospace;
    }

    .row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    button {
      flex: 1 1 auto; min-width: 120px; padding: 12px; border: none;
      border-radius: 8px; font-size: 0.95rem; font-weight: 600;
      color: white; cursor: pointer; background: #2d6a4f;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.alt { background: #475569; }
    button.warn { background: #b45309; }

    .log {
      margin-top: 16px; background: #0f172a; color: #e2e8f0;
      border-radius: 8px; padding: 12px; font-family: ui-monospace, monospace;
      font-size: 0.8rem; white-space: pre-wrap; word-break: break-all;
      max-height: 60vh; overflow-y: auto;
    }
    .hint {
      margin-top: 12px; padding: 10px; border-radius: 8px;
      background: #fef3c7; color: #78350f; font-size: 0.8rem;
    }
  </style>
</head>
<body>
<main>
  <h1>Phase 0 疎通テスト（camera-qr → GAS）</h1>
  <p>GitHub Pages からデプロイ済み GAS Web App の <code>/exec</code> に POST し、レスポンスが <code>fetch().then</code> で読めるかを確認します。</p>

  <div class="hint">
    ⚠ GAS Web App は access=ANYONE でデプロイしてください（MYSELF のままだと認証が走り CORS の前にブロックされます）。
  </div>

  <label>GAS /exec URL（デプロイ後に貼付）</label>
  <input type="text" id="url" placeholder="https://script.google.com/macros/s/.../exec">

  <label>session_id（任意・テスト識別用）</label>
  <input type="text" id="sid" value="">

  <div class="row">
    <button id="btn-urlencoded">POST (urlencoded)</button>
    <button id="btn-textplain" class="alt">POST (text/plain)</button>
    <button id="btn-nocors" class="warn">POST (no-cors 参考)</button>
  </div>
  <div class="row">
    <button id="btn-clear" class="alt" style="flex:0 0 auto;">ログクリア</button>
  </div>

  <div class="log" id="log">(まだ何も送信していません)</div>
</main>

<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var logEl = $('log');
  var sidEl = $('sid');

  function ts() {
    var d = new Date();
    return d.toTimeString().substring(0, 8) + '.' +
           String(d.getMilliseconds()).padStart(3, '0');
  }
  function log(msg) {
    logEl.textContent = (logEl.textContent === '(まだ何も送信していません)' ? '' : logEl.textContent) +
                        '[' + ts() + '] ' + msg + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }

  function newSid() {
    return 'phase0-' + Math.random().toString(36).substring(2, 10);
  }
  sidEl.value = newSid();

  function buildPayload() {
    return {
      session_id: sidEl.value || newSid(),
      status: 'success',
      qr_raw: 'A25383657132002509',
      uqr_raw: '2203511',
      client_ts: Date.now(),
      note: 'Phase 0 smoke test'
    };
  }

  function getUrl() {
    var u = ($('url').value || '').trim();
    if (!u) { log('ERROR: GAS /exec URL 未入力'); return null; }
    if (!/^https:\/\/script\.google\.com\/macros\/s\/[^\/]+\/exec/.test(u)) {
      log('WARN: URL が /exec 形式と異なります: ' + u);
    }
    return u;
  }

  async function doFetch(mode, body, contentType) {
    var url = getUrl();
    if (!url) return;
    var payload = buildPayload();
    log('--- ' + mode + ' ---');
    log('POST ' + url);
    log('Content-Type: ' + (contentType || '(default)'));
    log('session_id: ' + payload.session_id);
    var t0 = performance.now();
    try {
      var opts = { method: 'POST', body: body };
      if (contentType) opts.headers = { 'Content-Type': contentType };
      if (mode === 'no-cors') opts.mode = 'no-cors';
      var res = await fetch(url, opts);
      var ms = Math.round(performance.now() - t0);
      log('response in ' + ms + 'ms');
      log('  status = ' + res.status + ' ' + res.statusText);
      log('  type   = ' + res.type);
      log('  ok     = ' + res.ok);
      if (res.type === 'opaque') {
        log('  (opaque なので body 読み取り不可。これは mode:no-cors の宿命)');
        return;
      }
      var text = await res.text();
      log('body (' + text.length + ' chars):');
      log(text.substring(0, 800));
      try {
        var j = JSON.parse(text);
        log('parsed OK: ok=' + j.ok + ' body_len=' + j.body_len + ' ctype=' + j.content_type);
      } catch (e) {
        log('JSON parse failed: ' + e.message);
      }
    } catch (err) {
      var ms2 = Math.round(performance.now() - t0);
      log('FETCH FAILED in ' + ms2 + 'ms: ' + err.name + ': ' + err.message);
      log('(多くの場合 CORS プリフライトで落ちている。Networkタブで OPTIONS を確認)');
    }
  }

  $('btn-urlencoded').onclick = function () {
    var p = buildPayload();
    var body = new URLSearchParams({ payload: JSON.stringify(p) });
    doFetch('urlencoded', body, null);  // fetch が自動で application/x-www-form-urlencoded を付ける
  };
  $('btn-textplain').onclick = function () {
    doFetch('text/plain', JSON.stringify(buildPayload()), 'text/plain');
  };
  $('btn-nocors').onclick = function () {
    doFetch('no-cors', new URLSearchParams({ payload: JSON.stringify(buildPayload()) }), null);
  };
  $('btn-clear').onclick = function () {
    logEl.textContent = '(クリア済)';
    sidEl.value = newSid();
  };
})();
</script>
</body>
</html>
