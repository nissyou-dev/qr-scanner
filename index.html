<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRスキャナー（zxing-wasm）</title>
  <script src="https://cdn.jsdelivr.net/npm/zxing-wasm@1/dist/iife/reader/index.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f4f8; min-height: 100vh; padding: 16px; }
    h1 { text-align: center; color: #2d6a4f; font-size: 1.3rem; margin-bottom: 16px; }
    #video-container {
      width: 100%; max-width: 480px; margin: 0 auto;
      border-radius: 12px; overflow: hidden; background: #000; position: relative;
    }
    video { width: 100%; display: block; }
    canvas { display: none; }
    #overlay {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 200px;
      border: 2px solid #2d6a4f; border-radius: 8px; pointer-events: none;
    }
    #status { text-align: center; font-size: 0.85rem; color: #888; margin-top: 8px; }
    #result-box {
      max-width: 480px; margin: 16px auto 0; background: white;
      border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none;
    }
    #result-box h2 { color: #2d6a4f; font-size: 1rem; margin-bottom: 4px; }
    #result-format { font-size: 0.75rem; color: #888; margin-bottom: 8px; }
    #result-text { word-break: break-all; font-size: 1rem; color: #333; }
    #result-text a { color: #1a73e8; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
    #btn-copy { background: #2d6a4f; color: white; }
    #btn-open { background: #1a73e8; color: white; display: none; }
    #btn-rescan { background: #eee; color: #333; }
    #history-box { max-width: 480px; margin: 16px auto 0; }
    #history-box h2 { color: #555; font-size: 0.95rem; margin-bottom: 8px; }
    .history-item {
      background: white; border-radius: 8px; padding: 10px 14px;
      margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 0.9rem; word-break: break-all; color: #333;
    }
    .history-item .time { font-size: 0.75rem; color: #aaa; margin-bottom: 2px; }
    .history-item .fmt { font-size: 0.75rem; color: #2d6a4f; margin-bottom: 4px; }
    #btn-clear-history {
      width: 100%; padding: 8px; background: #fee2e2; color: #b91c1c;
      border: none; border-radius: 8px; font-size: 0.85rem; cursor: pointer; margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>QR / マイクロQR スキャナー</h1>
  <div id="video-container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="overlay"></div>
  </div>
  <div id="status">初期化中...</div>

  <div id="result-box">
    <h2>読み取り結果</h2>
    <div id="result-format"></div>
    <div id="result-text"></div>
    <div class="btn-row">
      <button id="btn-copy" onclick="copyResult()">コピー</button>
      <button id="btn-open" onclick="openUrl()">URLを開く</button>
      <button id="btn-rescan" onclick="もう一度スキャン">もう一度スキャン</button>
    </div>
  </div>

  <div id="history-box" style="display:none">
    <h2>履歴</h2>
    <div id="history-list"></div>
    <button id="btn-clear-history" onclick="clearHistory()">履歴を削除</button>
  </div>

  <script>
    let lastResult = '';
    let scanning = false;
    let scanTimer = null;
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    document.getElementById('btn-rescan').onclick = rescan;

    function isUrl(t) { return /^https?:\/\//i.test(t); }

    async function init() {
      document.getElementById('status').textContent = 'ライブラリ読み込み中...';
      await ZXingWASM.getZXingModule();
      document.getElementById('status').textContent = 'カメラ起動中...';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          scanning = true;
          document.getElementById('status').textContent = 'スキャン中...';
          scanLoop();
        };
      } catch (e) {
        document.getElementById('status').textContent = 'カメラへのアクセスを許可してください。';
      }
    }

    async function scanLoop() {
      if (!scanning) return;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      try {
        const results = await ZXingWASM.readBarcodesFromImageData(imageData, {
          formats: ['QRCode', 'MicroQRCode'],
          tryHarder: true,
          tryRotate: true,
          tryInvert: true,
          tryDownscale: true,
        });
        if (results && results.length > 0) {
          const text = results[0].text;
          const format = results[0].format;
          if (text && text !== lastResult) {
            lastResult = text;
            onScanSuccess(text, format);
            return;
          }
        }
      } catch (e) {}
      scanTimer = setTimeout(scanLoop, 100);
    }

    function onScanSuccess(text, format) {
      scanning = false;
      clearTimeout(scanTimer);
      document.getElementById('status').textContent = '';
      document.getElementById('result-box').style.display = 'block';
      document.getElementById('result-format').textContent = '種別: ' + (format || 'QRCode');
      const el = document.getElementById('result-text');
      if (isUrl(text)) {
        el.innerHTML = `<a href="${text}" target="_blank">${text}</a>`;
        document.getElementById('btn-open').style.display = 'block';
      } else {
        el.textContent = text;
        document.getElementById('btn-open').style.display = 'none';
      }
      saveHistory(text, format);
    }

    function copyResult() {
      navigator.clipboard.writeText(lastResult).then(() => {
        document.getElementById('btn-copy').textContent = 'コピーしました！';
        setTimeout(() => { document.getElementById('btn-copy').textContent = 'コピー'; }, 2000);
      });
    }
    function openUrl() { window.open(lastResult, '_blank'); }
    function rescan() {
      lastResult = '';
      document.getElementById('result-box').style.display = 'none';
      scanning = true;
      document.getElementById('status').textContent = 'スキャン中...';
      scanLoop();
    }

    function saveHistory(text, format) {
      const history = JSON.parse(localStorage.getItem('qr-history') || '[]');
      history.unshift({ text, format: format || 'QRCode', time: new Date().toLocaleString('ja-JP') });
      if (history.length > 30) history.pop();
      localStorage.setItem('qr-history', JSON.stringify(history));
      renderHistory();
    }
    function renderHistory() {
      const history = JSON.parse(localStorage.getItem('qr-history') || '[]');
      const box = document.getElementById('history-box');
      const list = document.getElementById('history-list');
      if (!history.length) { box.style.display = 'none'; return; }
      box.style.display = 'block';
      list.innerHTML = history.map(h => `
        <div class="history-item">
          <div class="time">${h.time}</div>
          <div class="fmt">${h.format}</div>
          ${isUrl(h.text) ? `<a href="${h.text}" target="_blank">${h.text}</a>` : h.text}
        </div>`).join('');
    }
    function clearHistory() {
      if (!confirm('履歴を削除しますか？')) return;
      localStorage.removeItem('qr-history');
      renderHistory();
    }

    renderHistory();
    init();
  </script>
</body>
</html>
